name: Deploy CertNode to Fly.io

on:
  push:
    branches: [main]

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ORG_SLUG: ${{ vars.FLY_ORG_SLUG || 'personal' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly app exists (idempotent)
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="$(sed -n 's/^app = "\([^"]*\)"/\1/p' fly.toml)"
          echo "Ensuring app exists: ${APP_NAME} in org ${FLY_ORG_SLUG:-personal} (region iad)"
          # Try to create; if it already exists, keep going
          flyctl apps create "$APP_NAME" --org "${FLY_ORG_SLUG:-personal}" --region iad || echo "App may already exist."

      - name: Deploy
        run: |
          APP_NAME=$(sed -n 's/^app = "\([^"]*\)"/\1/p' fly.toml)
          flyctl deploy -a "$APP_NAME" -c fly.toml --remote-only --strategy immediate