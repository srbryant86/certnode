name: Deploy CertNode to Fly.io
on:
  push:
    branches: [main]

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ORG_SLUG: ${{ vars.FLY_ORG_SLUG || 'personal' }}

    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure app exists (GitHub-only, robust)
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME=$(awk -F'"' '/^app = "/ {print $2; exit}' fly.toml)
          ORG="${FLY_ORG_SLUG:-personal}"
          echo "APP=$APP_NAME ORG=$ORG"
          if ! flyctl apps show "$APP_NAME" >/dev/null 2>&1; then
            echo "Creating app..."
            flyctl apps create "$APP_NAME" --org "$ORG" || echo "App may already exist."
            PRIMARY=$(awk -F'"' '/^primary_region = "/ {print $2; exit}' fly.toml || true)
            if [ -n "${PRIMARY:-}" ]; then
              flyctl regions set -a "$APP_NAME" "$PRIMARY" || true
            fi
          else
            echo "App already exists."
          fi

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME=$(awk -F'"' '/^app = "/ {print $2; exit}' fly.toml)
          flyctl deploy -a "$APP_NAME" -c fly.toml --remote-only --strategy immediate