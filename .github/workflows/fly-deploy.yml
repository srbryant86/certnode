name: Deploy CertNode to Fly.io

on:
  push:
    branches: [main]

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ORG_SLUG: ${{ vars.FLY_ORG_SLUG || 'personal' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly app exists
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="$(sed -n 's/^app = "\([^"]*\)"/\1/p' fly.toml)"
          echo "App from fly.toml: $APP_NAME"
          if ! flyctl apps show "$APP_NAME" >/dev/null 2>&1; then
            echo "Creating app $APP_NAME in org $FLY_ORG_SLUG (region iad)..."
            flyctl apps create "$APP_NAME" --org "$FLY_ORG_SLUG" --region iad
          else
            echo "App $APP_NAME already exists."
          fi

      - name: Deploy
        run: flyctl deploy -c fly.toml --remote-only --strategy immediate