name: Deploy CertNode to Fly.io
on:
  push:
    branches: [main]

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure app exists (org=personal)
        shell: bash
        run: |
          set -euo pipefail
          APP=$(awk -F'"' '/^app = "/{print $2; exit}' fly.toml)
          ORG="personal"
          echo "APP=$APP ORG=$ORG"
          flyctl apps create "$APP" --org "$ORG" || echo "create skipped"
          # Verify visibility in the target org
          flyctl apps list --org "$ORG" | awk '{print $1}' | grep -qx "$APP"

          # Set region from fly.toml if provided
          PRIM=$(awk -F'"' '/^primary_region = "/{print $2; exit}' fly.toml || true)
          [ -n "${PRIM:-}" ] && flyctl regions set -a "$APP" "$PRIM" || true

      - name: Preflight (paths)
        shell: bash
        run: |
          set -e
          test -f infra/Dockerfile || { echo "infra/Dockerfile missing"; exit 1; }
          echo "OK: infra/Dockerfile present"

      - name: Deploy (explicit org/app)
        shell: bash
        run: |
          set -euo pipefail
          APP=$(awk -F'"' '/^app = "/{print $2; exit}' fly.toml)
          flyctl deploy -a "$APP" -c fly.toml -o personal --remote-only --strategy immediate --verbose