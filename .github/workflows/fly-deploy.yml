name: Deploy CertNode to Fly.io

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_ORG_SLUG: personal

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate config
        run: |
          set -e
          flyctl apps list >/dev/null
          flyctl status -a certnode || true
          flyctl deploy -c fly.toml --remote-only --strategy immediate --ha=false --wait-timeout 600