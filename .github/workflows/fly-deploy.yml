name: Deploy CertNode to Fly.io
on:
  push:
    branches: [main]

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy (create-then-deploy)
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME=$(grep -m1 '^app = "' fly.toml | cut -d'"' -f2)
          echo "APP=$APP_NAME"
          # ensure app exists in Personal org; ignore if it already exists
          flyctl apps create "$APP_NAME" --org personal --region iad || true
          # deploy using explicit app + config
          flyctl deploy -a "$APP_NAME" -c fly.toml --remote-only --strategy immediate --verbose