name: Provision Domain Certificates

on:
  workflow_dispatch:

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  provision:
    runs-on: ubuntu-latest
    outputs:
      apex_record: ${{ steps.outs.outputs.apex_record }}
      www_record: ${{ steps.outs.outputs.www_record }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Add certs (idempotent)
        run: |
          flyctl certs add certnode.io -a certnode || true
          flyctl certs add www.certnode.io -a certnode || true

      - name: DNS outputs
        id: outs
        run: |
          echo "Gathering DNS config..."
          flyctl certs show certnode.io -a certnode || true
          flyctl certs show www.certnode.io -a certnode || true
          echo "apex_record=CNAME (flatten) @ -> certnode.fly.dev  (Proxy: DNS only)" >> $GITHUB_OUTPUT
          echo "www_record=CNAME www -> certnode.fly.dev (Proxy: DNS only)" >> $GITHUB_OUTPUT
          echo "::notice::Set Cloudflare DNS:"
          echo "::notice::Apex: CNAME (flatten) certnode.fly.dev  (Proxy OFF initially)"
          echo "::notice::WWW : CNAME certnode.fly.dev           (Proxy OFF initially)"