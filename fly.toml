app = "certnode"
primary_region = "iad"

[build]
  dockerfile = "./infra/Dockerfile"

[env]
  PORT = "8080"
  APP_ENV = "prod"
  LOG_LEVEL = "INFO"
  CORS_ORIGINS = "https://certnode.io,https://www.certnode.io,https://certnode.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    grace_period = "10s"
    interval = "10s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
# To scale:
# [[vm]]
#   cpu_kind = "shared"
#   cpus = 2
#   memory_mb = 2048