app = "certnode"
primary_region = "iad"

[build]
  dockerfile = "./infra/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

[[checks]]
  name = "http"
  type = "http"
  port = 8080
  interval = "10s"
  timeout = "2s"
  grace_period = "15s"
  method = "GET"
  path = "/healthz"