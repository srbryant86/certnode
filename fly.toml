app = "certnode"
primary_region = "iad"

[build]
  dockerfile = "./infra/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.http_check]
    grace_period = "15s"
    method       = "GET"
    path         = "/healthz"
    interval     = "10s"
    timeout      = "2s"
