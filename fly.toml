app = "certnode"
primary_region = "iad"

[build]
  dockerfile = "./infra/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
[[checks]]
  name         = "http"
  type         = "http"
  interval     = "10s"
  timeout      = "2s"
  grace_period = "15s"
  path         = "/healthz"
  port         = 8080