app = "certnode"
primary_region = "iad"

[build]
  dockerfile = "./infra/Dockerfile"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory = "1024MB"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = false
  min_machines_running = 1
  processes = ["app"]

[http_service.concurrency]
  type = "requests"
  soft_limit = 50
  hard_limit = 100

[[checks]]
  name = "http"
  type = "http"
  method = "GET"
  path = "/healthz"
  port = 8080
  interval = "10s"
  timeout = "2s"
  grace_period = "15s"